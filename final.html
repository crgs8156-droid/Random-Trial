<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💕 Next Step 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink:    #FF6B8A;
      --bg:      #FFF0F3;
      --card-bg: rgba(255,255,255,0.88);
      --font:    'Nunito', cursive, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 30%, rgba(255,179,193,0.55) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(255,107,138,0.30) 0%, transparent 50%);
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px; overflow: hidden;
    }

    canvas#confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    .card {
      position: relative; z-index: 1;
      background: var(--card-bg); backdrop-filter: blur(14px);
      border-radius: 32px; border: 2px solid rgba(255,107,138,0.22);
      box-shadow: 0 10px 50px rgba(255,107,138,0.30),
                  inset 0 1px 0 rgba(255,255,255,0.95);
      padding: 52px 44px 48px; max-width: 500px; width: 100%;
      text-align: center; display: flex; flex-direction: column; align-items: center; gap: 22px;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.65) translateY(40px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .title {
      font-size: clamp(1.6rem, 5.5vw, 2.3rem);
      font-weight: 900; color: var(--pink); line-height: 1.25;
      text-shadow: 0 3px 16px rgba(255,107,138,0.28);
      animation: pulse 1.6s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.03); }
    }

    .gif-wrap {
      width: 190px; height: 190px; border-radius: 50%;
      overflow: hidden; border: 5px solid #FFB3C1;
      box-shadow: 0 6px 30px rgba(255,107,138,0.32);
      background: var(--bg);
    }
    .gif-wrap img { width: 100%; height: 100%; object-fit: cover; }

    /* CHANGE THIS: the main message styling */
    .message {
      font-size: 1.2rem; font-weight: 800; color: #6b2d3e;
      line-height: 1.65; max-width: 380px;
    }
    .message .highlight {
      color: var(--pink);
      font-size: 1.35rem;
    }
    .emoji-big { font-size: 2.4rem; }

    .hearts-row {
      font-size: 2rem; letter-spacing: 6px;
      animation: bounce 1s ease infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-8px); }
    }

    .back-btn {
      font-family: var(--font); font-size: 0.9rem; font-weight: 700;
      color: var(--pink); text-decoration: none;
      border: 2px solid var(--pink); border-radius: 50px;
      padding: 9px 22px; transition: background 0.2s, color 0.2s;
    }
    .back-btn:hover { background: var(--pink); color: #fff; }

    @media (max-width: 440px) {
      .card { padding: 36px 20px; }
      .gif-wrap { width: 145px; height: 145px; }
      .message { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

  <canvas id="confetti-canvas"></canvas>

  <div class="card">

    <!-- CHANGE THIS: final page title -->
    <h1 class="title">The Next Step! 🥂💕</h1>

    <!-- CHANGE THIS: final page GIF -->
    <div class="gif-wrap">
      <img src="https://media.tenor.com/EBV7OT7ACfwAAAAj/u-u-qua-qua-u-quaa.gif"
           alt="Excited character"/>
    </div>

    <!-- CHANGE THIS: the big spicy message -->
    <p class="message">
      So as you decided to take it to the next step...<br/><br/>
      <span class="highlight">Let's make babies together</span> —
      and I'm not kidding&nbsp;<span class="emoji-big">👶🍼</span>
    </p>

    <div class="hearts-row" aria-hidden="true">💕💖💗💓💘</div>

    <a href="index.html" class="back-btn">↩ Start over</a>
  </div>

  <!-- CHANGE THIS: celebration music -->
  <audio id="final-music" loop autoplay>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"/>
  </audio>

  <script src="yes-script.js"></script>
</body>
</html>
