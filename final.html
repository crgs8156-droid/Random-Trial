<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💕 Next Step 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink:    #FF6B8A;
      --pink-mid:#FFB3C1;
      --bg:      #FFF0F3;
      --card-bg: rgba(255,255,255,0.88);
      --green:   #2DC653;
      --font:    'Nunito', cursive, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 30%, rgba(255,179,193,0.55) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(255,107,138,0.30) 0%, transparent 50%);
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px; overflow-x: hidden;
    }

    canvas#confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    .card {
      position: relative; z-index: 1;
      background: var(--card-bg); backdrop-filter: blur(14px);
      border-radius: 32px; border: 2px solid rgba(255,107,138,0.22);
      box-shadow: 0 10px 50px rgba(255,107,138,0.30), inset 0 1px 0 rgba(255,255,255,0.95);
      padding: 48px 40px 44px; max-width: 500px; width: 100%;
      text-align: center; display: flex; flex-direction: column; align-items: center; gap: 20px;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.65) translateY(40px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .title {
      font-size: clamp(1.6rem, 5.5vw, 2.3rem);
      font-weight: 900; color: var(--pink); line-height: 1.25;
      text-shadow: 0 3px 16px rgba(255,107,138,0.28);
      animation: pulse 1.6s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.03); }
    }

    .gif-wrap {
      width: 180px; height: 180px; border-radius: 50%;
      overflow: hidden; border: 5px solid var(--pink-mid);
      box-shadow: 0 6px 30px rgba(255,107,138,0.32); background: var(--bg);
    }
    .gif-wrap img { width: 100%; height: 100%; object-fit: cover; }

    .message {
      font-size: 1.15rem; font-weight: 700; color: #6b2d3e;
      line-height: 1.7; max-width: 380px;
    }
    .message .highlight { color: var(--pink); font-size: 1.3rem; font-weight: 900; }
    .message .bold-word  { font-weight: 900; text-decoration: underline; }
    .emoji-big { font-size: 2.2rem; }

    /* ── Baby count picker ── */
    .picker-box {
      width: 100%;
      background: rgba(255,179,193,0.18);
      border: 2px solid rgba(255,107,138,0.20);
      border-radius: 20px;
      padding: 20px 18px 18px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .picker-label {
      font-size: 1.05rem; font-weight: 800; color: var(--pink);
    }
    .picker-options {
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    }
    .opt-btn {
      font-family: var(--font); font-weight: 800; font-size: 1rem;
      padding: 10px 20px; border-radius: 50px; border: 2.5px solid var(--pink-mid);
      background: #fff; color: var(--pink); cursor: pointer;
      transition: background 0.18s, color 0.18s, border-color 0.18s, transform 0.12s;
    }
    .opt-btn:hover  { background: var(--pink-mid); border-color: var(--pink-mid); }
    .opt-btn:active { transform: scale(0.94); }
    .opt-btn.selected {
      background: var(--pink); color: #fff; border-color: var(--pink);
      box-shadow: 0 4px 14px rgba(255,107,138,0.40);
    }

    .custom-row {
      display: flex; gap: 8px; align-items: center; width: 100%; max-width: 280px;
    }
    .custom-input {
      font-family: var(--font); font-weight: 700; font-size: 0.95rem;
      flex: 1; padding: 10px 14px; border-radius: 50px;
      border: 2.5px solid var(--pink-mid); outline: none; color: #6b2d3e;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .custom-input:focus { border-color: var(--pink); box-shadow: 0 0 0 3px rgba(255,107,138,0.18); }
    .custom-input::placeholder { color: #c9a0ac; font-weight: 600; }

    /* answer reveal */
    .answer-reveal {
      font-size: 1.1rem; font-weight: 800; color: var(--pink);
      min-height: 24px; transition: opacity 0.3s;
      opacity: 0;
    }
    .answer-reveal.show { opacity: 1; }

    .hearts-row {
      font-size: 1.9rem; letter-spacing: 6px;
      animation: bounce 1s ease infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-8px); }
    }

    .back-btn {
      font-family: var(--font); font-size: 0.9rem; font-weight: 700;
      color: var(--pink); text-decoration: none;
      border: 2px solid var(--pink); border-radius: 50px;
      padding: 9px 22px; transition: background 0.2s, color 0.2s;
    }
    .back-btn:hover { background: var(--pink); color: #fff; }

    @media (max-width: 440px) {
      .card { padding: 34px 18px 34px; }
      .gif-wrap { width: 140px; height: 140px; }
      .message { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <canvas id="confetti-canvas"></canvas>

  <div class="card">

    <h1 class="title">The Next Step! 🥂💕</h1>

    <div class="gif-wrap">
      <img src="https://media.tenor.com/EBV7OT7ACfwAAAAj/u-u-qua-qua-u-quaa.gif" alt="Excited character"/>
    </div>

    <!-- "kidding" is now bolded + underlined -->
    <p class="message">
      So as you decided to take it to the next step...<br/><br/>
      <span class="highlight">Let's make babies together</span> —
      and I'm not <span class="bold-word">kidding</span>&nbsp;<span class="emoji-big">👶🍼</span>
    </p>

    <!-- ── Baby count picker ── -->
    <div class="picker-box">
      <p class="picker-label">How many do you want? 🍼</p>

      <div class="picker-options" id="picker-options">
        <button class="opt-btn" onclick="selectOption(this, '5')">5</button>
        <button class="opt-btn" onclick="selectOption(this, '6')">6</button>
        <button class="opt-btn" onclick="selectOption(this, '7')">7</button>
        <button class="opt-btn" onclick="selectOption(this, '8')">8</button>
      </div>

      <div class="custom-row">
        <input
          class="custom-input"
          id="custom-input"
          type="text"
          placeholder="Or type your own... ✍️"
          oninput="handleCustomInput(this)"
          maxlength="30"
        />
      </div>

      <p class="answer-reveal" id="answer-reveal"></p>
    </div>

    <div class="hearts-row" aria-hidden="true">💕💖💗💓💘</div>

    <a href="index.html" class="back-btn">↩ Start over</a>
  </div>

  <audio id="final-music" loop autoplay>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"/>
  </audio>

  <script src="yes-script.js"></script>
  <script>
    // ── Baby count picker logic ───────────────────────────────────────────────
    const reveal = document.getElementById("answer-reveal");

    function selectOption(btn, value) {
      // deselect all option buttons
      document.querySelectorAll(".opt-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      // clear custom input
      document.getElementById("custom-input").value = "";
      showReveal(value);
    }

    function handleCustomInput(input) {
      // deselect preset buttons when typing
      document.querySelectorAll(".opt-btn").forEach(b => b.classList.remove("selected"));
      const val = input.value.trim();
      if (val) {
        showReveal(val);
      } else {
        reveal.classList.remove("show");
      }
    }

    function showReveal(val) {
      reveal.textContent = "Aww, " + val + " it is! 💕 I can't wait! 🥰";
      reveal.classList.add("show");
    }
  </script>
</body>
</html>
