<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💖 YAY! You said Yes! 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    /* ── CHANGE THIS: celebration colours ── */
    :root {
      --bg:       #FFF0F3;
      --pink:     #FF6B8A;
      --deep:     #d63060;
      --card-bg:  rgba(255,255,255,0.88);
      --font:     'Nunito', cursive, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 25% 20%,  rgba(255,179,193,0.55) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 80%,  rgba(255,107,138,0.30) 0%, transparent 50%);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 24px 16px;
    }

    /* ── Confetti canvas sits behind everything ── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card-bg);
      backdrop-filter: blur(14px);
      border-radius: 32px;
      border: 2px solid rgba(255,107,138,0.22);
      box-shadow: 0 10px 50px rgba(255,107,138,0.28),
                  inset 0 1px 0 rgba(255,255,255,0.95);
      padding: 52px 44px 48px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      animation: popIn 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── Title ── */
    .title {
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      font-weight: 900;
      color: var(--pink);
      line-height: 1.2;
      text-shadow: 0 3px 14px rgba(255,107,138,0.30);
      animation: pulse 1.4s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1);    filter: brightness(1); }
      to   { transform: scale(1.04); filter: brightness(1.08); }
    }

    /* ── GIF ── */
    .gif-wrap {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      overflow: hidden;
      border: 5px solid #FFB3C1;
      box-shadow: 0 6px 30px rgba(255,107,138,0.35);
      background: var(--bg);
    }

    .gif-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── Message ── */
    .message {
      font-size: 1.15rem;
      font-weight: 700;
      color: #7a3d50;
      line-height: 1.55;
      max-width: 360px;
    }

    .hearts-row {
      font-size: 2rem;
      letter-spacing: 6px;
      animation: bounce 1s ease infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-8px); }
    }

    /* ── Back link ── */
    .back-btn {
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--pink);
      text-decoration: none;
      border: 2px solid var(--pink);
      border-radius: 50px;
      padding: 9px 22px;
      transition: background 0.2s, color 0.2s;
    }
    .back-btn:hover {
      background: var(--pink);
      color: #fff;
    }

    @media (max-width: 440px) {
      .card { padding: 36px 20px 36px; }
      .gif-wrap { width: 150px; height: 150px; }
    }
  </style>
</head>
<body>

  <canvas id="confetti-canvas"></canvas>

  <div class="card">

    <!-- CHANGE THIS: celebration title -->
    <h1 class="title">YAY! You said Yes!&nbsp;🎉💖</h1>

    <!-- CHANGE THIS: celebration GIF -->
    <div class="gif-wrap">
      <img src="https://media.tenor.com/zBFhxXOqftUAAAAj/happy-anime.gif"
           alt="Happy celebrating character" />
    </div>

    <!-- CHANGE THIS: your loving message -->
    <p class="message">
      I love you so so much! 💕<br/>
      You've just made me the happiest person in the world.<br/>
      You're my favourite everything. 🌸
    </p>

    <div class="hearts-row" aria-hidden="true">💕💖💗💓💘</div>

    <a href="index.html" class="back-btn">↩ Go back</a>

  </div>

  <audio id="yes-music" loop autoplay>
    <!-- CHANGE THIS: celebration music URL -->
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"/>
  </audio>

  <script src="yes-script.js"></script>
</body>
</html>
