<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💖 Thanks! 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink:    #FF6B8A;
      --bg:      #FFF0F3;
      --card-bg: rgba(255,255,255,0.88);
      --font:    'Nunito', cursive, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 25% 20%, rgba(255,179,193,0.55) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 80%, rgba(255,107,138,0.30) 0%, transparent 50%);
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
    }
    #hearts-container { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .heart { position: absolute; bottom: -60px; opacity: 0; animation: floatUp linear infinite; }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
      10%  { opacity: 0.55; } 85% { opacity: 0.35; }
      100% { transform: translateY(-110vh) rotate(25deg) scale(1.1); opacity: 0; }
    }
    .card {
      position: relative; z-index: 1;
      background: var(--card-bg); backdrop-filter: blur(14px);
      border-radius: 32px; border: 2px solid rgba(255,107,138,0.22);
      box-shadow: 0 10px 50px rgba(255,107,138,0.28);
      padding: 52px 44px 48px; max-width: 480px; width: 100%;
      text-align: center; display: flex; flex-direction: column; align-items: center; gap: 24px;
      animation: popIn 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .title { font-size: clamp(1.5rem,5vw,2rem); font-weight: 900; color: var(--pink); line-height: 1.3; text-shadow: 0 3px 14px rgba(255,107,138,0.25); }
    .gif-wrap { width: 170px; height: 170px; border-radius: 50%; overflow: hidden; border: 4px solid #FFB3C1; box-shadow: 0 6px 28px rgba(255,107,138,0.28); background: var(--bg); }
    .gif-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .subtitle { font-size: 1.05rem; font-weight: 700; color: #7a3d50; line-height: 1.6; max-width: 340px; }
    .btn-yes { font-family: var(--font); font-weight: 800; font-size: 1.25rem; padding: 16px 50px; background: #2DC653; color: #fff; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 6px 20px rgba(45,198,83,0.38); transition: transform 0.15s, box-shadow 0.15s, background 0.2s; }
    .btn-yes:hover { background: #25a844; transform: scale(1.06); }
    .btn-yes:active { transform: scale(0.94); }
    @media (max-width: 440px) { .card { padding: 36px 20px; } .gif-wrap { width: 130px; height: 130px; } }
  </style>
</head>
<body>
  <div id="hearts-container" aria-hidden="true"></div>
  <div class="card">
    <h1 class="title">Thanks! 💕</h1>
    <!-- CHANGE THIS: intermediate page GIF -->
    <div class="gif-wrap">
      <img src="https://media.tenor.com/zBFhxXOqftUAAAAj/happy-anime.gif" alt="Happy character"/>
    </div>
    <!-- CHANGE THIS: intermediate message -->
    <p class="subtitle">
      Thanks for saying Yes! 🥰<br/>
      Click <strong>YES</strong> again to take it to the next step...
    </p>
    <button class="btn-yes" onclick="window.location.href='final.html'">Yes! 💖</button>
  </div>
  <script>
    const HEARTS = ["💕","💖","💗","💓","💘","🩷","❤️","💝"];
    const container = document.getElementById("hearts-container");
    for (let i = 0; i < 20; i++) {
      const h = document.createElement("span");
      h.className = "heart";
      h.textContent = HEARTS[Math.floor(Math.random() * HEARTS.length)];
      h.style.left = Math.random() * 100 + "vw";
      h.style.fontSize = (0.9 + Math.random() * 1.2) + "rem";
      h.style.animationDuration = (7 + Math.random() * 10) + "s";
      h.style.animationDelay    = (Math.random() * 12) + "s";
      container.appendChild(h);
    }
  </script>
</body>
</html>
